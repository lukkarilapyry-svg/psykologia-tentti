<h2>Chapter 1: The Science of Psychology</h2>
<h3>What Is Science?</h3>
<p>Science is a general way of understanding the natural world through <strong>systematic empiricism</strong>, <strong>empirical questions</strong>, and <strong>public knowledge</strong>.</p>
<div class="key-term"><strong>Systematic empiricism</strong> — Learning about the world through carefully planned and systematic observations, not casual ones.</div>
<div class="key-term"><strong>Empirical questions</strong> — Questions that can be answered by making observations (as opposed to value judgments).</div>
<div class="key-term"><strong>Public knowledge</strong> — Scientific findings are published, allowing replication, self-correction, and large-scale collaboration.</div>
<h3>Scientific Research in Psychology</h3>
<p>Psychological research follows a cyclical model: research question → study design → data collection → analysis → conclusions → publication → new questions.</p>
<ul>
  <li><strong>Basic research</strong> — conducted to learn about human behaviour for its own sake.</li>
  <li><strong>Applied research</strong> — conducted to solve some practical problem.</li>
</ul>
<h3>Science vs. Common Sense</h3>
<p>Folk psychology (common sense beliefs about behaviour) is often wrong. Examples:</p>
<ul>
  <li>"Venting anger" actually increases anger, not reduces it (Bushman, 2002).</li>
  <li>False confessions are surprisingly common, not only from torture.</li>
  <li>"People only use 10% of their brain" — a myth.</li>
</ul>
<div class="key-term"><strong>Scepticism</strong> — Not accepting claims at face value; demanding evidence. A core feature of scientific thinking.</div>
<h3>Science and Clinical Practice</h3>
<p>Clinical psychology uses <strong>empirically supported treatments (ESTs)</strong> — therapies backed by systematic research. Examples: CBT for depression, exposure therapy for phobias.</p>
<div class="key-term"><strong>Pseudoscience</strong> — Claims that look scientific but lack systematic empiricism, empirical questions, or public knowledge. Examples: astrology, graphology.</div>
`

<h2>Chapter 2: Getting Started in Research</h2>
<h3>Basic Concepts</h3>
<div class="key-term"><strong>Variable</strong> — A quantity or quality that varies across people or situations. Examples: height, intelligence, gender.</div>
<div class="key-term"><strong>Operational definition</strong> — A definition of a variable in terms of how it will be measured or manipulated.</div>
<p>Types of variables:</p>
<ul>

  <li><strong>Dependent variable (DV)</strong> — measured as an outcome.</li>

  <li><strong>Confounding variable</strong> — an extraneous variable that systematically varies with the IV, making it impossible to determine which caused the effect.</li>
</ul>
<h3>Generating Research Questions</h3>
<p>Good research questions can come from: casual observations, practical problems, previous research, and theories. A good question is <strong>empirically testable</strong> and <strong>interesting</strong>.</p>
<h3>Reviewing the Research Literature</h3>
<p>Key databases: <strong>PsycINFO</strong> (the primary psychology database), <strong>Google Scholar</strong>. Literature can include:</p>
<ul>
  <li><strong>Empirical research reports</strong> — original data collection.</li>
  <li><strong>Review articles</strong> — summarise previous research.</li>
  <li><strong>Meta-analyses</strong> — statistically combine results of multiple studies.</li>
</ul>
<div class="key-term"><strong>Peer review</strong> — Before publication, research is evaluated by independent experts (peers) in the field.</div>
`

<h3>Moral Foundations</h3>
<p>Research ethics are based on events like the <strong>Nuremberg trials</strong> (Nazi experiments), <strong>Tuskegee syphilis study</strong> (withheld treatment from African Americans), and <strong>Milgram's obedience study</strong> and <strong>Zimbardo's Stanford prison experiment</strong>.</p>
<h3>Core Ethical Principles (Belmont Report)</h3>
<ul>
  <li><strong>Respect for persons</strong> — treating people as autonomous and protecting vulnerable individuals.</li>

<div class="key-term"><strong>Informed consent</strong> — Participants must be told about the study's purpose, procedures, risks, and their right to withdraw at any time.</div>

<h3>Ethics Committees / IRB</h3>

<p>The "three Rs": <strong>Replacement</strong> (use alternatives when possible), <strong>Refinement</strong> (minimise suffering), <strong>Reduction</strong> (use minimum number of animals).</p>

<p>An experiment has three key features:</p>
<ul>
  <li><strong>Manipulation</strong> of an independent variable (IV).</li>

  <li><strong>Abstract</strong> — 150–250 word summary of the entire paper.</li>
  <li><strong>Introduction</strong> — literature review, research question, hypotheses.</li>
  <li><strong>Method</strong> — participants, materials/apparatus, procedure. Must be detailed enough for replication.</li>
  <li><strong>Results</strong> — statistical analyses (no interpretation).</li>
  <li><strong>Discussion</strong> — interpretation, limitations, future directions.</li>
  <li><strong>References</strong> — all cited sources in APA format.</li>
</ul>
<div class="key-term"><strong>In-text citation</strong> — (Author, Year) format. E.g., (Mehl et al., 2007). <strong>Reference list</strong> — full details of every source cited.</div>
`

<h2>Chapter 12: Descriptive Statistics</h2>
<h3>Describing Single Variables</h3>
<p><strong>Measures of central tendency</strong>:</p>
<ul>
  <li><strong>Mean</strong> — arithmetic average. Affected by outliers.</li>
  <li><strong>Median</strong> — middle value. Robust to outliers.</li>
  <li><strong>Mode</strong> — most frequent value. The only option for nominal data.</li>
</ul>
<p><strong>Measures of variability</strong>:</p>
<ul>
  <li><strong>Range</strong> — max minus min.</li>

</ul>

<h3>Describing Relationships</h3>
<ul>
  <li><strong>Pearson's r</strong> — measures the strength and direction of a linear relationship between two quantitative variables. Ranges from −1 to +1.</li>
  <li>r ≈ ±0.1 = weak, ±0.3 = moderate, ±0.5+ = strong (Cohen's guidelines).</li>
</ul>
<div class="key-term"><strong>Scatterplot</strong> — A graph showing pairs of scores on two variables. Each dot is one participant.</div>

    html: `
<h2>Chapter 13: Inferential Statistics</h2>
<h3>Null Hypothesis Testing (NHST)</h3>
<div class="key-term"><strong>Null hypothesis (H₀)</strong> — There is no effect or no difference (e.g., the means are equal). <strong>Alternative hypothesis (H₁)</strong> — There IS an effect or difference.</div>
<p>Process: assume H₀ is true → calculate how likely the observed data are under H₀ → if very unlikely (p < α), reject H₀.</p>
<div class="key-term"><strong>p-value</strong> — The probability of obtaining results at least as extreme as observed, assuming H₀ is true. It is NOT the probability that H₀ is true.</div>
<div class="key-term"><strong>Alpha level (α)</strong> — The threshold for rejecting H₀, typically set at .05 (5%). If p < .05, the result is "statistically significant".</div>
<h3>Types of Errors</h3>
<ul>
  <li><strong>Type I error (false positive)</strong> — Rejecting H₀ when it is actually true. Probability = α.</li>
  <li><strong>Type II error (false negative)</strong> — Failing to reject H₀ when it is actually false. Probability = β.</li>
  <li><strong>Statistical power</strong> — Probability of correctly rejecting a false H₀ = 1 − β. Increased by larger sample size, larger effect, and α level.</li>
</ul>
<h3>Common Tests</h3>
<ul>
  <li><strong>t-test</strong> — compares means of two groups (independent-samples or paired-samples).</li>
  <li><strong>ANOVA (Analysis of Variance)</strong> — compares means of three or more groups. Uses the F statistic.</li>
  <li><strong>Chi-square (χ²) test</strong> — tests association between categorical variables.</li>
  <li><strong>Correlation (Pearson's r)</strong> — tests if the correlation significantly differs from zero.</li>
</ul>
<h3>Effect Size</h3>
<div class="key-term"><strong>Effect size</strong> — A measure of the magnitude of the effect, independent of sample size. <strong>Cohen's d</strong> (for differences): 0.2 = small, 0.5 = medium, 0.8 = large. <strong>r</strong> or <strong>η²</strong> for correlational designs.</div>
<h3>Confidence Intervals</h3>
<p>A <strong>95% confidence interval</strong> means: if we repeated the study many times, 95% of the computed intervals would contain the true population parameter.</p>
<h3>Replication Crisis & Open Science</h3>
<p>Many psychology findings have failed to replicate. Responses include:</p>
<ul>
  <li><strong>Pre-registration</strong> — publishing the research plan before collecting data.</li>
  <li><strong>Open data and open materials</strong> — sharing data and study materials publicly.</li>
  <li><strong>Replication studies</strong> — deliberately repeating previous studies.</li>
  <li>Awareness of <strong>p-hacking</strong> (trying many analyses until p < .05) and <strong>HARKing</strong> (Hypothesising After Results are Known).</li>
</ul>
`

// ╔══════════════════════════════════════════╗
// ║          QUIZ QUESTIONS                  ║
// ╚══════════════════════════════════════════╝
const QUESTIONS = [
  // CH 1 — Science of Psychology
  {cat:"Science of Psychology",q:"The three fundamental features of science are systematic empiricism, empirical questions, and public knowledge.",correct:true,explanation:"These are the defining characteristics that distinguish science from non-science."},
  {cat:"Science of Psychology",q:"Empirical questions are those that can be answered by reasoning alone, without observation.",correct:false,explanation:"Empirical questions are answered through systematic observation and data collection, not reasoning alone."},
  {cat:"Science of Psychology",q:"Basic research is conducted to solve a specific practical problem.",correct:false,explanation:"Basic research aims to learn about behaviour for its own sake. Applied research is conducted to solve practical problems."},
  {cat:"Science of Psychology",q:"Pseudoscience refers to beliefs that are claimed to be scientific but lack one or more features of science.",correct:true,explanation:"Pseudosciences like astrology or graphology may appear scientific but lack systematic empiricism, empirical testability, or public knowledge."},
  {cat:"Science of Psychology",q:"Venting anger (e.g., punching something) has been shown by research to effectively reduce anger.",correct:false,explanation:"Bushman (2002) showed that venting anger actually tends to leave people feeling MORE angry, not less. This is an example of folk psychology being wrong."},
  {cat:"Science of Psychology",q:"An empirically supported treatment (EST) is a therapy backed by systematic research evidence.",correct:true,explanation:"ESTs are clinical treatments whose effectiveness has been demonstrated through controlled research (e.g., CBT for depression)."},

  {cat:"Getting Started in Research",q:"An operational definition defines a variable in terms of how it will be measured or manipulated.",correct:true,explanation:"For example, defining 'stress' as score on the Perceived Stress Scale is an operational definition."},
  {cat:"Getting Started in Research",q:"A confounding variable is any variable other than the IV that could influence the DV.",correct:false,explanation:"That describes an extraneous variable. A confounding variable specifically co-varies systematically with the IV, making it impossible to determine which caused the effect."},
  {cat:"Getting Started in Research",q:"PsycINFO is the primary database for finding psychological research literature.",correct:true,explanation:"PsycINFO, maintained by the APA, is the most comprehensive database for psychology research."},
  {cat:"Getting Started in Research",q:"A meta-analysis is a study that collects new original data from a very large sample.",correct:false,explanation:"A meta-analysis statistically combines results from multiple EXISTING studies. It does not collect new original data."},
  {cat:"Getting Started in Research",q:"In peer review, research is evaluated by independent experts before publication.",correct:true,explanation:"Peer review is a quality-control process where other researchers evaluate the methodology and conclusions before a study is published."},

  // CH 3 — Ethics
  {cat:"Research Ethics",q:"The three core ethical principles from the Belmont Report are respect for persons, beneficence, and justice.",correct:true,explanation:"Respect for persons (autonomy), beneficence (minimise harm, maximise benefit), and justice (fair distribution of costs and benefits)."},
  {cat:"Research Ethics",q:"Deception in research is never allowed under any circumstances.",correct:false,explanation:"Deception is allowed when there is no alternative, the study has scientific value, and it is followed by debriefing. The ethics committee must approve it."},
  {cat:"Research Ethics",q:"Informed consent means participants must be told about the study's purpose, procedures, risks, and their right to withdraw.",correct:true,explanation:"Informed consent is a fundamental ethical requirement. Participants must voluntarily agree to participate with full information."},
  {cat:"Research Ethics",q:"Debriefing occurs before the study begins to prepare participants.",correct:false,explanation:"Debriefing occurs AFTER participation. It involves telling participants the true purpose of the study, especially if deception was used."},
  {cat:"Research Ethics",q:"The 'three Rs' in animal research ethics are Replacement, Refinement, and Reduction.",correct:true,explanation:"Replace animals with alternatives when possible, refine procedures to minimise suffering, and reduce the number of animals used."},
  {cat:"Research Ethics",q:"The Tuskegee syphilis study is an example of ethical research conduct.",correct:false,explanation:"The Tuskegee study (1932–1972) was deeply unethical — researchers withheld treatment from African American men with syphilis without their informed consent."},

  // CH 4 — Theory
  {cat:"Theory in Psychology",q:"A theory is a coherent explanation of one or more phenomena that goes beyond description.",correct:true,explanation:"Theories explain WHY phenomena occur, not just describe them."},
  {cat:"Theory in Psychology",q:"A hypothesis is a broad theoretical framework that cannot be directly tested.",correct:false,explanation:"A hypothesis is a SPECIFIC, testable prediction derived from a theory. Theories themselves are broader and tested indirectly through hypotheses."},
  {cat:"Theory in Psychology",q:"Falsifiability means a theory can potentially be disproved by observations.",correct:true,explanation:"According to Karl Popper, falsifiability is a key criterion for scientific theories. A theory that cannot be disproven by any possible observation is not scientific."},
  {cat:"Theory in Psychology",q:"Parsimony means preferring the most complex explanation available.",correct:false,explanation:"Parsimony (Occam's razor) means preferring the SIMPLEST explanation that accounts for the data."},
  {cat:"Theory in Psychology",q:"When a hypothesis is confirmed, the theory is supported but never definitively 'proved'.",correct:true,explanation:"Science operates through provisional support. Confirming hypotheses strengthens a theory but can never prove it with 100% certainty."},

  // CH 5 — Measurement
  {cat:"Psychological Measurement",q:"Nominal measurement involves categories with no meaningful order.",correct:true,explanation:"Examples: gender, ethnicity, eye colour. You cannot rank these categories meaningfully."},
  {cat:"Psychological Measurement",q:"IQ is measured at the ratio level because it has equal intervals and a true zero.",correct:false,explanation:"IQ is measured at the INTERVAL level (equal intervals but no true zero — IQ of 0 does not mean zero intelligence). Ratio examples: height, weight, reaction time."},
  {cat:"Psychological Measurement",q:"Test-retest reliability measures the consistency of a test over time.",correct:true,explanation:"The same test is administered twice and scores are correlated. High correlation = good test-retest reliability."},
  {cat:"Psychological Measurement",q:"Face validity is the strongest form of validity.",correct:false,explanation:"Face validity is the WEAKEST form — it merely means the test appears to measure the construct. Construct validity (including convergent and discriminant) is the most comprehensive."},

  {cat:"Psychological Measurement",q:"Discriminant validity means a measure correlates highly with measures of the same construct.",correct:false,explanation:"That describes CONVERGENT validity. Discriminant validity means a measure does NOT correlate with measures of different/unrelated constructs."},
  {cat:"Psychological Measurement",q:"Construct validity is the broadest type of validity, encompassing convergent and discriminant validity.",correct:true,explanation:"Construct validity asks whether the measure truly captures the theoretical construct it claims to measure, including both convergent and discriminant evidence."},

  // CH 6 — Experimental Research
  {cat:"Experimental Research",q:"The three key features of an experiment are manipulation of an IV, measurement of a DV, and control of extraneous variables.",correct:true,explanation:"These three features together allow researchers to establish cause-and-effect relationships."},

  {cat:"Experimental Research",q:"Counterbalancing is used to control order effects in between-subjects designs.",correct:false,explanation:"Counterbalancing controls order effects in WITHIN-subjects designs (where the same participants experience all conditions). Between-subjects designs use random assignment."},
  {cat:"Experimental Research",q:"Internal validity refers to how well results can be generalised to other populations.",correct:false,explanation:"That describes EXTERNAL validity. Internal validity refers to the degree of confidence that the IV caused the change in the DV (no confounds)."},
  {cat:"Experimental Research",q:"A placebo group receives an inert treatment to control for expectancy effects.",correct:true,explanation:"The placebo group controls for the possibility that improvement occurs simply because participants expect to improve, not because of the treatment itself."},

  {cat:"Non-experimental Research",q:"Correlational research can establish cause-and-effect relationships.",correct:false,explanation:"Correlation does not imply causation. The directionality problem and third-variable problem prevent causal conclusions from correlational data."},

  {cat:"Non-experimental Research",q:"The third-variable problem occurs when an unmeasured variable might cause both correlated variables.",correct:true,explanation:"Example: Ice cream sales and drowning rates are correlated, but the third variable (hot weather) causes both."},
  {cat:"Non-experimental Research",q:"Grounded theory builds theory from data rather than testing a pre-existing theory.",correct:true,explanation:"In grounded theory (a qualitative approach), the researcher collects data first and develops theory inductively from patterns in the data."},

  {cat:"Complex Research Designs",q:"A 2×2 factorial design has two independent variables, each with two levels.",correct:true,explanation:"The notation describes the number of IVs (factors) and their levels. 2×2 = two IVs, each with two levels = 4 conditions total."},
  {cat:"Complex Research Designs",q:"A main effect describes how the effect of one IV depends on the level of another IV.",correct:false,explanation:"That describes an INTERACTION. A main effect is the overall effect of one IV, averaged across all levels of the other IV(s)."},
  {cat:"Complex Research Designs",q:"An interaction in a factorial design means 'it depends' — the effect of one IV changes across levels of another.",correct:true,explanation:"When an interaction is present, the effect of one factor is different depending on the level of the other factor."},
  {cat:"Complex Research Designs",q:"Multiple regression uses multiple predictor variables to predict one outcome variable.",correct:true,explanation:"Multiple regression extends simple regression by including two or more predictor (independent) variables to explain variance in the dependent variable."},
  {cat:"Complex Research Designs",q:"Factor analysis tests whether one variable causes another.",correct:false,explanation:"Factor analysis identifies clusters of correlated variables (latent factors). It does not test causal relationships."},

  // CH 9 — Survey Research
  {cat:"Survey Research",q:"A double-barrelled question asks about two different things at once.",correct:true,explanation:"Example: 'Do you find the course interesting and useful?' — a respondent might find it interesting but not useful. Each aspect should be a separate question."},
  {cat:"Survey Research",q:"A Likert scale typically uses a range like 1 (Strongly Disagree) to 5 (Strongly Agree).",correct:true,explanation:"Likert scales are the most commonly used rating scales in psychology surveys for measuring attitudes."},
  {cat:"Survey Research",q:"In probability sampling, every member of the population has a known chance of being selected.",correct:true,explanation:"Probability sampling (e.g., simple random sampling, stratified sampling) allows generalisation to the population and statistical inference."},
  {cat:"Survey Research",q:"Convenience sampling is a type of probability sampling.",correct:false,explanation:"Convenience sampling is NON-probability sampling — participants are selected based on availability, not random selection. Results cannot be generalised as confidently."},
  {cat:"Survey Research",q:"Social desirability bias means participants tend to answer in a way they think is socially acceptable.",correct:true,explanation:"This is a major threat in surveys about sensitive topics. Participants may under-report socially undesirable behaviours and over-report desirable ones."},
  {cat:"Survey Research",q:"Non-response bias occurs when the people who respond to a survey differ systematically from those who don't.",correct:true,explanation:"If non-responders differ from responders on the variable of interest, the survey results will not accurately represent the population."},

  // CH 10 — Single-Subject
  {cat:"Single-Subject Research",q:"In an ABA (reversal) design, the treatment is introduced and then withdrawn to see if behaviour changes.",correct:true,explanation:"A = baseline, B = treatment, A = withdrawal. If behaviour changes with B and returns with the second A, it suggests a causal effect of the treatment."},
  {cat:"Single-Subject Research",q:"Single-subject research has excellent external validity and generalisability.",correct:false,explanation:"Single-subject research has LIMITED external validity because results from one individual may not generalise to others. Its strength is detailed individual data."},
  {cat:"Single-Subject Research",q:"A multiple-baseline design introduces treatment at different times for different behaviours or participants.",correct:true,explanation:"If change occurs only when treatment is introduced for each behaviour/participant, this provides evidence of causality without needing withdrawal."},

  // CH 11 — Presenting Research
  {cat:"Presenting Research",q:"The Method section of an APA research report must be detailed enough for replication.",correct:true,explanation:"Replicability is a cornerstone of science. The Method section describes participants, materials, and procedure in sufficient detail for another researcher to repeat the study."},
  {cat:"Presenting Research",q:"The Discussion section of an APA paper contains the statistical analyses.",correct:false,explanation:"Statistical analyses go in the RESULTS section. The Discussion section interprets the findings, discusses limitations, and suggests future directions."},
  {cat:"Presenting Research",q:"An abstract is a 150-250 word summary of the entire research paper.",correct:true,explanation:"The abstract appears at the beginning and summarises the research question, method, results, and conclusions."},

  {cat:"Descriptive Statistics",q:"The mean is more robust to outliers than the median.",correct:false,explanation:"The MEDIAN is more robust to outliers. The mean is pulled toward extreme values, while the median (middle value) is not."},
  {cat:"Descriptive Statistics",q:"Standard deviation is the most commonly reported measure of variability.",correct:true,explanation:"SD measures the average distance of scores from the mean and is the standard measure of spread in psychological research."},
  {cat:"Descriptive Statistics",q:"In a normal distribution, approximately 95% of data falls within ±2 standard deviations of the mean.",correct:true,explanation:"The empirical rule: 68% within ±1 SD, 95% within ±2 SD, 99.7% within ±3 SD."},
  {cat:"Descriptive Statistics",q:"Pearson's r ranges from 0 to +1.",correct:false,explanation:"Pearson's r ranges from −1 to +1. Negative values indicate a negative (inverse) relationship; positive values indicate a positive relationship."},

  {cat:"Descriptive Statistics",q:"The mode is the only measure of central tendency appropriate for nominal data.",correct:true,explanation:"You cannot calculate a mean or median for categories (e.g., favourite colour). The most frequent category (mode) is the only option."},

  {cat:"Inferential Statistics",q:"The null hypothesis states that there is no effect or no difference.",correct:true,explanation:"H₀ is the default assumption that there is no relationship or difference. The researcher tries to reject H₀ by finding evidence for the alternative hypothesis."},

// ║            APP LOGIC                     ║
// ╚══════════════════════════════════════════╝
let mode = 'study';
let currentChapter = 0;
let quizCat = 'all';
let queue = [], qIdx = 0, score = 0, answered = false;

// Mode toggle
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', (m==='study'?0:1)===i));
  document.getElementById('studyArea').classList.toggle('show', m==='study');
  document.getElementById('quizArea').classList.toggle('show', m==='quiz');
  if (m==='quiz') restartQuiz();
}

// ── STUDY ──
function buildStudy() {
  const nav = document.getElementById('chapterNav');
  CHAPTERS.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'ch-btn' + (i===0?' active':'');
    btn.textContent = ch.title.replace('Ch ','').split(':')[0];
    btn.onclick = () => showChapter(i);
    nav.appendChild(btn);
  });
  showChapter(0);
}
function showChapter(i) {
  currentChapter = i;
  document.querySelectorAll('.ch-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  document.getElementById('studyContent').innerHTML = CHAPTERS[i].html;
}

// ── QUIZ ──
function buildCatBar() {
  const cats = [...new Set(QUESTIONS.map(q=>q.cat))];
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '<button class="cat-btn active" onclick="setCat(\'all\')">All</button>';
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className='cat-btn'; b.textContent=c; b.onclick=()=>setCat(c);
    bar.appendChild(b);
  });
}
function setCat(c) {
  quizCat = c;
  document.querySelectorAll('#categoryBar .cat-btn').forEach(b => b.classList.toggle('active', (c==='all'&&b.textContent==='All')||b.textContent===c));
  restartQuiz();
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function restartQuiz(){
  const pool = quizCat==='all'?QUESTIONS:QUESTIONS.filter(q=>q.cat===quizCat);
  queue=shuffle(pool); qIdx=0; score=0; answered=false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizInner').style.display='block';
  showQ();
}
function restartSame(){restartQuiz();}
function showQ(){
  if(qIdx>=queue.length){showResult();return;}
  answered=false;
  const q=queue[qIdx];
  document.getElementById('progressFill').style.width=(qIdx/queue.length*100)+'%';
  document.getElementById('questionCounter').textContent=`${qIdx+1} / ${queue.length}`;
  document.getElementById('scorePill').textContent=`Correct: ${score}`;
  document.getElementById('catBadge').textContent=q.cat;
  document.getElementById('questionText').textContent=q.q;
  document.querySelectorAll('.tf-btn').forEach(b=>{b.disabled=false;b.className=b.classList.contains('true-btn')?'tf-btn true-btn':'tf-btn false-btn';});
  document.getElementById('explanation').className='explanation';
  document.getElementById('explanation').innerHTML='';
  document.getElementById('nextBtn').className='next-btn';
}
function selectAnswer(userTrue){
  if(answered)return; answered=true;
  const q=queue[qIdx], ok=(userTrue===q.correct);
  if(ok)score++;
  document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  const tb=document.querySelector('.true-btn'),fb=document.querySelector('.false-btn');
  if(userTrue){tb.classList.add(ok?'selected-correct':'selected-wrong');if(!ok)fb.classList.add('was-correct');}
  else{fb.classList.add(ok?'selected-correct':'selected-wrong');if(!ok)tb.classList.add('was-correct');}
  const el=document.getElementById('explanation');
  el.innerHTML=`<strong>${ok?'✓ Correct!':'✗ Wrong — the statement is '+(q.correct?'TRUE':'FALSE')+'.'}</strong> ${q.explanation}`;
  el.className='explanation show';
  document.getElementById('nextBtn').className='next-btn show';
}
function nextQuestion(){qIdx++;showQ();}
function showResult(){
  document.getElementById('quizInner').style.display='none';
  const rs=document.getElementById('resultScreen');rs.classList.add('show');
  const pct=Math.round(score/queue.length*100);
  document.getElementById('resultScore').textContent=`${score}/${queue.length}`;
  let g='';if(pct>=90)g='🏆 Excellent!';else if(pct>=75)g='🎯 Good job!';else if(pct>=60)g='📚 Decent — review more!';else g='💪 Keep studying!';
  document.getElementById('resultGrade').textContent=g;
}

buildStudy();
buildCatBar();
</script>
