    html:`
<h2>Luku 1: Psykologia tieteenä</h2>
<h3>Mitä tiede on?</h3>
<p>Tiede on yleinen tapa ymmärtää luonnollista maailmaa. Sillä on kolme peruspiirrettä: <strong>systemaattinen empirismi</strong>, <strong>empiiriset kysymykset</strong> ja <strong>julkinen tieto</strong>.</p>
<div class="key-term"><strong>Systemaattinen empirismi</strong> — Maailmasta opitaan huolellisesti suunniteltujen ja järjestelmällisten havaintojen kautta, ei satunnaisten.</div>
<div class="key-term"><strong>Empiiriset kysymykset</strong> — Kysymykset, joihin voidaan vastata havaintojen perusteella (eivät ole arvoarvostelmia).</div>
<div class="key-term"><strong>Julkinen tieto</strong> — Tieteelliset löydökset julkaistaan, mikä mahdollistaa toistettavuuden, itsekorjautuvuuden ja laajan yhteistyön.</div>
<h3>Tieteellinen tutkimus psykologiassa</h3>
<p>Psykologinen tutkimus noudattaa syklistä mallia: tutkimuskysymys → tutkimusasetelma → aineistonkeruu → analyysi → johtopäätökset → julkaisu → uudet kysymykset.</p>
<ul>
  <li><strong>Perustutkimus</strong> — tehdään ihmisen käyttäytymisen ymmärtämiseksi sinänsä.</li>
  <li><strong>Soveltava tutkimus</strong> — tehdään jonkin käytännön ongelman ratkaisemiseksi.</li>
</ul>
<h3>Tiede vs. maalaisjärki</h3>
<p>Arkipsykologia (folk psychology) on usein väärässä. Esimerkkejä:</p>
<ul>
  <li>"Vihan purkaminen" (esim. nyrkkeileminen) itse asiassa lisää vihaa, ei vähennä (Bushman, 2002).</li>
  <li>Väärät tunnustukset ovat yllättävän yleisiä — ei pelkästään kidutuksen seurausta.</li>
  <li>"Ihmiset käyttävät vain 10 % aivoistaan" — myytti.</li>
</ul>
<div class="key-term"><strong>Skeptisyys</strong> — Väitteitä ei hyväksytä sellaisenaan vaan vaaditaan todisteita. Tieteellisen ajattelun ydinpiirre.</div>
<h3>Tiede ja kliininen käytäntö</h3>
<p>Kliininen psykologia käyttää <strong>empiirisesti tuettuja hoitoja (EST)</strong> — terapioita, joiden teho on osoitettu järjestelmällisessä tutkimuksessa. Esimerkkejä: KKT masennukseen, altistusterapia fobioihin.</p>
<div class="key-term"><strong>Pseudotiede</strong> — Väitteet, jotka näyttävät tieteellisiltä mutta joista puuttuu yksi tai useampi tieteen peruspiirre. Esimerkkejä: astrologia, grafologia.</div>
`

<h2>Luku 2: Tutkimuksen perusteet</h2>
<h3>Peruskäsitteet</h3>
<div class="key-term"><strong>Muuttuja (variable)</strong> — Ominaisuus, joka vaihtelee yksilöiden tai tilanteiden välillä. Esimerkkejä: pituus, älykkyys, sukupuoli.</div>
<div class="key-term"><strong>Operationaalinen määritelmä</strong> — Muuttujan määritteleminen sen mittaus- tai manipulointitavan kautta.</div>
<p>Muuttujatyypit:</p>
<ul>
  <li><strong>Riippumaton muuttuja (IV)</strong> — tutkija manipuloi tätä.</li>
  <li><strong>Riippuva muuttuja (DV)</strong> — mitataan tuloksena.</li>
  <li><strong>Ulkoinen muuttuja (extraneous)</strong> — mikä tahansa muu muuttuja, joka voi vaikuttaa riippuvaan muuttujaan.</li>
  <li><strong>Sekoittava muuttuja (confound)</strong> — ulkoinen muuttuja, joka vaihtelee systemaattisesti riippumattoman muuttujan kanssa, jolloin syy-seuraussuhdetta ei voida päätellä.</li>
</ul>
<h3>Tutkimuskysymysten muodostaminen</h3>
<p>Hyvät tutkimuskysymykset voivat syntyä arkihavainnoista, käytännön ongelmista, aiemmasta tutkimuksesta ja teorioista. Hyvä kysymys on <strong>empiirisesti testattavissa</strong> ja <strong>kiinnostava</strong>.</p>
<h3>Kirjallisuuskatsaus</h3>
<p>Keskeiset tietokannat: <strong>PsycINFO</strong> (psykologian ensisijainen tietokanta), <strong>Google Scholar</strong>. Kirjallisuus voi sisältää:</p>
<ul>
  <li><strong>Empiiriset tutkimusraportit</strong> — alkuperäistä aineistonkeruuta.</li>
  <li><strong>Katsausartikkelit</strong> — tiivistävät aiempaa tutkimusta.</li>
  <li><strong>Meta-analyysit</strong> — yhdistävät useiden tutkimusten tulokset tilastollisesti.</li>
</ul>
<div class="key-term"><strong>Vertaisarviointi (peer review)</strong> — Ennen julkaisua tutkimus arvioidaan riippumattomien asiantuntijoiden toimesta.</div>

<h2>Luku 3: Tutkimusetiikka</h2>
<h3>Moraaliset perusteet</h3>
<p>Tutkimusetiikka perustuu tapahtumiin kuten <strong>Nürnbergin oikeudenkäynnit</strong> (natsikokeelliset), <strong>Tuskegeen syfilis-tutkimus</strong> (hoito evättiin afroamerikkalaisilta), <strong>Milgramin tottelevaisuuskoe</strong> ja <strong>Zimbardon Stanford-vankilakoe</strong>.</p>
<h3>Eettiset ydinperiaatteet (Belmontin raportti)</h3>
<ul>
  <li><strong>Henkilöiden kunnioittaminen</strong> — ihmisiä kohdellaan autonomisina ja haavoittuvia yksilöitä suojellaan.</li>
  <li><strong>Hyväntahtoisuus (beneficence)</strong> — haittojen minimointi ja hyötyjen maksimointi.</li>
  <li><strong>Oikeudenmukaisuus (justice)</strong> — tutkimuksen kustannusten ja hyötyjen oikeudenmukainen jakautuminen.</li>
</ul>
<h3>Keskeiset käytännöt</h3>
<div class="key-term"><strong>Tietoon perustuva suostumus (informed consent)</strong> — Osallistujille kerrotaan tutkimuksen tarkoitus, menetelmät, riskit ja oikeus vetäytyä milloin tahansa.</div>
<div class="key-term"><strong>Harhaanjohtaminen (deception)</strong> — Sallittu vain, kun vaihtoehtoja ei ole ja tutkimuksella on tieteellistä arvoa. Jälkikeskustelu (debriefing) on pakollinen.</div>
<div class="key-term"><strong>Jälkikeskustelu (debriefing)</strong> — Tutkimuksen todellisen tarkoituksen kertominen osallistujalle osallistumisen jälkeen.</div>
<div class="key-term"><strong>Luottamuksellisuus (confidentiality)</strong> — Osallistujien tietoja ei saa yhdistää henkilöllisyyteen.</div>
<h3>Eettinen toimikunta / IRB</h3>
<p><strong>Eettinen toimikunta (IRB, Institutional Review Board)</strong> arvioi kaiken ihmisiin kohdistuvan tutkimuksen ennen sen aloittamista. Tutkimus luokitellaan riskitason mukaan.</p>
<h3>Eläintutkimuksen etiikka</h3>
<p>Kolme R:ää: <strong>Replacement</strong> (käytä vaihtoehtoja), <strong>Refinement</strong> (minimoi kärsimys), <strong>Reduction</strong> (käytä mahdollisimman vähän eläimiä).</p>

<h2>Luku 4: Teoria psykologiassa</h2>
<h3>Ilmiöt ja teoriat</h3>
<div class="key-term"><strong>Ilmiö (phenomenon)</strong> — Yleinen tulos, joka on havaittu toistuvasti empiirisessä tutkimuksessa (esim. sivustakatsoja-efekti).</div>
<div class="key-term"><strong>Teoria</strong> — Johdonmukainen selitys yhdelle tai useammalle ilmiölle. Teoria ylittää kuvailun ja selittää MIKSI jokin tapahtuu.</div>
<h3>Teorioiden moninaisuus</h3>
<p>Teoriat vaihtelevat laajoista <strong>teoreettisista näkökulmista</strong> (esim. evoluutiopsykologia, sosiaalinen konstruktionismi) tarkempiin, testattaviin <strong>vaiheteorioihin</strong> (esim. Piagetin kognitiivisen kehityksen vaiheet).</p>
<h3>Hypoteesit</h3>
<div class="key-term"><strong>Hypoteesi</strong> — Teoriasta johdettu spesifinen, testattavissa oleva ennuste. Empiirinen tutkimus testaa hypoteeseja, ei teoriaa suoraan.</div>
<p>Kun hypoteesit vahvistuvat, teoria saa tukea (mutta sitä ei koskaan "todisteta"). Kun ne kumoutuvat, teoriaa on ehkä muokattava tai hylättävä.</p>
<h3>Hyvän teorian ominaisuudet</h3>
<ul>
  <li><strong>Yksinkertaisuus (parsimonia)</strong> — yksinkertaisemmat selitykset ovat parempia (Occamin partaveitsi).</li>
  <li><strong>Laajuus (scope)</strong> — selittää monia eri ilmiöitä.</li>
  <li><strong>Falsifioitavuus</strong> — on mahdollista kumota havaintojen perusteella (Popper). Ei-falsifioitavat teoriat eivät ole tieteellisiä.</li>
  <li><strong>Ennustusvoima</strong> — tuottaa tarkkoja ennusteita.</li>
</ul>

<h2>Luku 5: Psykologinen mittaaminen</h2>
<h3>Mittaustasojen hierarkia</h3>
<ul>
  <li><strong>Nominaalitaso</strong> — luokat ilman järjestystä (esim. sukupuoli, silmien väri).</li>

  <li><strong>Suhdeasteikko (ratio)</strong> — yhtä suuret välit + todellinen nollapiste (esim. pituus, paino, reaktioaika).</li>

<p>Reliabiliteetti = mittauksen johdonmukaisuus.</p>

<p>Validiteetti = missä määrin mittari todella mittaa sitä, mitä sen väitetään mittaavan.</p>

<h2>Luku 6: Kokeellinen tutkimus</h2>
<h3>Kokeen perusteet</h3>
<p>Kokeella on kolme keskeistä piirrettä:</p>
<ul>
  <li><strong>Riippumattoman muuttujan manipulointi</strong>.</li>
  <li><strong>Riippuvan muuttujan mittaaminen</strong>.</li>
  <li><strong>Ulkoisten muuttujien kontrollointi</strong> kausaliteetin osoittamiseksi.</li>
</ul>
<div class="key-term"><strong>Sisäinen validiteetti</strong> — Missä määrin voimme luotettavasti sanoa, että riippumaton muuttuja aiheutti riippuvan muuttujan muutoksen (ei sekoittavia tekijöitä). Hyvän kokeen tunnusmerkki.</div>
<h3>Koeasetelmien tyypit</h3>
<ul>
  <li><strong>Ryhmien välinen asetelma (between-subjects)</strong> — eri osallistujat eri koeryhmissä. Käyttää <strong>satunnaistamista</strong>.</li>
  <li><strong>Toistettujen mittausten asetelma (within-subjects)</strong> — samat osallistujat kaikissa koeryhmissä. Poistaa yksilöerot, mutta riskinä <strong>järjestysefektit</strong>.</li>
  <li><strong>Vastapanotus (counterbalancing)</strong> — koetilanteen järjestystä vaihdellaan järjestysefektien kontrolloimiseksi.</li>
</ul>
<h3>Kontrolliasetelmat</h3>
<ul>
  <li><strong>Kontrolliryhmä</strong> — ei saa hoitoa tai saa vakiovertailun.</li>
  <li><strong>Lumeryhmä (placebo)</strong> — saa vaikuttamattoman hoidon odotusefektien kontrolloimiseksi.</li>
</ul>
<div class="key-term"><strong>Satunnaistaminen (random assignment)</strong> — Jokaisella osallistujalla on yhtä suuri mahdollisuus joutua mihin tahansa koeryhmään. Ensisijainen tapa kontrolloida sekoittavia tekijöitä.</div>
<div class="key-term"><strong>Ulkoinen validiteetti</strong> — Missä määrin tulokset ovat yleistettävissä muihin ihmisiin, ympäristöihin ja ajankohtiin.</div>

<h2>Luku 7: Ei-kokeellinen tutkimus</h2>
<h3>Miksi ei-kokeellinen?</h3>
<p>Kun riippumatonta muuttujaa ei voida manipuloida (esim. sukupuoli, ikä, traumakokemus) tai satunnaistaminen on mahdotonta tai epäeettistä, käytetään ei-kokeellisia asetelmia.</p>
<div class="key-term"><strong>Keskeinen rajoitus</strong> — Ei-kokeellinen tutkimus ei voi osoittaa syy-seuraussuhteita, ainoastaan yhteyksiä ja korrelaatioita.</div>
<h3>Korrelatiivinen tutkimus</h3>
<p>Mitataan kahta tai useampaa muuttujaa ja tarkastellaan niiden välistä yhteyttä.</p>
<ul>
  <li><strong>Positiivinen korrelaatio</strong> — molemmat muuttujat kasvavat yhdessä (esim. pituus ja paino).</li>
  <li><strong>Negatiivinen korrelaatio</strong> — toinen kasvaa, toinen pienenee (esim. liikunta ja masennus).</li>
  <li><strong>Korrelaatio ei tarkoita kausaliteettia!</strong> — Suuntaongelma ja kolmannen muuttujan ongelma.</li>
</ul>
<div class="key-term"><strong>Suuntaongelma (directionality problem)</strong> — Aiheuttaako X:n Y vai Y:n X:n? <strong>Kolmannen muuttujan ongelma</strong> — Mittaamaton muuttuja Z saattaa aiheuttaa sekä X:n että Y:n.</div>
<h3>Kvasikokeellinen tutkimus</h3>
<p>Muistuttaa koetta, mutta satunnaistaminen puuttuu. Riippumaton muuttuja on <strong>ei-manipuloitu ryhmittelymuuttuja</strong> (esim. PTSD-ryhmä vs. kontrolliryhmä).</p>
<div class="key-term"><strong>Epäekvivalenttien ryhmien asetelma</strong> — olemassa olevien ryhmien vertailu. <strong>Esi-jälkitesti-asetelma</strong> — mittaus ennen ja jälkeen tapahtuman.</div>
<h3>Laadullinen tutkimus</h3>
<p>Keskittyy kokemusten ymmärtämiseen haastattelujen, havainnoinnin ja tekstianalyysin kautta. Aineisto on sanoja, ei lukuja.</p>
<ul>
  <li><strong>Grounded theory (ankkuroitu teoria)</strong> — teoria rakennetaan aineistosta, ei testata olemassa olevaa.</li>
  <li><strong>Tapaustutkimus</strong> — yksittäisen henkilön, ryhmän tai tapahtuman syvällinen tutkimus.</li>
</ul>

<p>Faktoriasetelmat voivat paljastaa:</p>

<p>Esimerkki: 2 (lääke vs. lume) × 2 (terapia vs. ei terapiaa) -asetelma voi osoittaa, yhdistyvätkö lääke ja terapia odottamattomalla tavalla.</p>

<h2>Luku 13: Päättelytilastotiede</h2>
<h3>Nollahypoteesin testaus (NHST)</h3>
<div class="key-term"><strong>Nollahypoteesi (H₀)</strong> — Efektiä tai eroa ei ole (esim. keskiarvot ovat yhtä suuret). <strong>Vaihtoehtoinen hypoteesi (H₁)</strong> — Efekti tai ero ON olemassa.</div>
<p>Prosessi: oletetaan H₀ todeksi → lasketaan kuinka todennäköinen havaittu tulos on H₀:n ollessa tosi → jos hyvin epätodennäköinen (p < α), hylätään H₀.</p>
<div class="key-term"><strong>p-arvo</strong> — Todennäköisyys saada vähintään yhtä äärimmäinen tulos, olettaen H₀:n todeksi. Se EI ole todennäköisyys sille, että H₀ on tosi.</div>
<div class="key-term"><strong>Alfa-taso (α)</strong> — Kynnys H₀:n hylkäämiselle, tyypillisesti 0,05 (5 %). Jos p < 0,05, tulos on "tilastollisesti merkitsevä".</div>
<h3>Virhetyypit</h3>
<ul>
  <li><strong>Tyypin I virhe (väärä positiivinen)</strong> — H₀ hylätään, vaikka se on tosi. Todennäköisyys = α.</li>
  <li><strong>Tyypin II virhe (väärä negatiivinen)</strong> — H₀:ta ei hylätä, vaikka se on epätosi. Todennäköisyys = β.</li>
  <li><strong>Tilastollinen voima (power)</strong> — Todennäköisyys hylätä oikeutetusti epätosi H₀ = 1 − β. Kasvaa suuremmalla otoskoolla, suuremmalla efektillä ja väljemmällä alfa-tasolla.</li>
</ul>
<h3>Yleiset testit</h3>
<ul>
  <li><strong>t-testi</strong> — vertaa kahden ryhmän keskiarvoja (riippumattomat tai parittaiset).</li>
  <li><strong>ANOVA (varianssianalyysi)</strong> — vertaa kolmen tai useamman ryhmän keskiarvoja. Käyttää F-testiä.</li>
  <li><strong>Khiin neliö -testi (χ²)</strong> — testaa kategoristen muuttujien yhteyttä.</li>
  <li><strong>Korrelaatio (Pearsonin r)</strong> — testaa eroaako korrelaatio merkitsevästi nollasta.</li>
</ul>
<h3>Efektikoko</h3>
<div class="key-term"><strong>Efektikoko</strong> — Efektin suuruuden mitta, riippumaton otoskoosta. <strong>Cohenin d</strong> (eroille): 0,2 = pieni, 0,5 = keskisuuri, 0,8 = suuri. <strong>r</strong> tai <strong>η²</strong> korrelatiivisille asetelmille.</div>
<h3>Luottamusvälit</h3>
<p><strong>95 % luottamusväli</strong> tarkoittaa: jos tutkimus toistettaisiin monta kertaa, 95 % lasketuista väleistä sisältäisi todellisen populaatioparametrin.</p>
<h3>Replikaatiokriisi ja avoin tiede</h3>
<p>Monet psykologian löydökset eivät ole replikoituneet. Ratkaisuja:</p>
<ul>
  <li><strong>Esirekisteröinti (pre-registration)</strong> — tutkimussuunnitelman julkaiseminen ennen aineistonkeruuta.</li>
  <li><strong>Avoin data ja avoimet materiaalit</strong> — aineiston ja tutkimusmateriaalien jakaminen julkisesti.</li>
  <li><strong>Replikaatiotutkimukset</strong> — aiempien tutkimusten tarkoituksellinen toistaminen.</li>
  <li>Tietoisuus <strong>p-hakkeroinnista</strong> (monia analyyseja kunnes p < 0,05) ja <strong>HARKingista</strong> (hypoteesien muodostaminen tulosten tuntemisen jälkeen).</li>
</ul>

  {cat:"Psykologinen mittaaminen",q:"Diskriminantti validiteetti tarkoittaa, että mittari korreloi vahvasti samaa konstruktiota mittaavien mittarien kanssa.",correct:false,explanation:"Se kuvaa KONVERGENTTIA validiteettia. Diskriminantti validiteetti tarkoittaa, että mittari EI korreloi eri konstruktioiden mittarien kanssa."},
  {cat:"Psykologinen mittaaminen",q:"Rakennevaliditeetti on laajin validiteetin tyyppi ja sisältää konvergentin ja diskriminantin validiteetin.",correct:true,explanation:"Rakennevaliditeetti arvioi, mittaako mittari todella sitä teoreettista konstruktiota, jota sen väitetään mittaavan."},

  // LUKU 6
  {cat:"Kokeellinen tutkimus",q:"Kokeen kolme keskeistä piirrettä ovat riippumattoman muuttujan manipulointi, riippuvan muuttujan mittaaminen ja ulkoisten muuttujien kontrollointi.",correct:true,explanation:"Nämä kolme piirrettä yhdessä mahdollistavat syy-seuraussuhteiden osoittamisen."},
  {cat:"Kokeellinen tutkimus",q:"Ryhmien välisessä asetelmassa (between-subjects) samoja osallistujia testataan kaikissa koetilanteissa.",correct:false,explanation:"Se kuvaa toistettujen mittausten asetelmaa (within-subjects). Ryhmien välisessä asetelmassa ERI osallistujat ovat eri koeryhmissä."},
  {cat:"Kokeellinen tutkimus",q:"Satunnaistaminen antaa jokaiselle osallistujalle yhtä suuren mahdollisuuden joutua mihin tahansa koeryhmään.",correct:true,explanation:"Satunnaistaminen on ensisijainen tapa kontrolloida sekoittavia tekijöitä ryhmien välisissä asetelmissa."},
  {cat:"Kokeellinen tutkimus",q:"Vastapanotusta (counterbalancing) käytetään järjestysefektien kontrolloimiseksi ryhmien välisissä asetelmissa.",correct:false,explanation:"Vastapanotus kontrolloi järjestysefektejä TOISTETTUJEN MITTAUSTEN asetelmissa. Ryhmien välisissä asetelmissa käytetään satunnaistamista."},
  {cat:"Kokeellinen tutkimus",q:"Sisäinen validiteetti tarkoittaa tulosten yleistettävyyttä muihin populaatioihin.",correct:false,explanation:"Se kuvaa ULKOISTA validiteettia. Sisäinen validiteetti tarkoittaa luottamusta siihen, että nimenomaan riippumaton muuttuja aiheutti riippuvan muuttujan muutoksen."},
  {cat:"Kokeellinen tutkimus",q:"Lumeryhmä (placebo) saa vaikuttamattoman hoidon odotusefektien kontrolloimiseksi.",correct:true,explanation:"Lumeryhmä kontrolloi mahdollisuutta, että parannus johtuu pelkästä odotuksesta eikä itse hoidosta."},

  // LUKU 7
  {cat:"Ei-kokeellinen tutkimus",q:"Korrelatiivisella tutkimuksella voidaan osoittaa syy-seuraussuhteita.",correct:false,explanation:"Korrelaatio ei osoita kausaatiota. Suuntaongelma ja kolmannen muuttujan ongelma estävät kausaalipäätelmät."},
  {cat:"Ei-kokeellinen tutkimus",q:"Positiivinen korrelaatio tarkoittaa, että molemmat muuttujat kasvavat yhdessä.",correct:true,explanation:"Positiivisessa korrelaatiossa toisen muuttujan kasvaessa toinenkin kasvaa (esim. pituus ja paino)."},
  {cat:"Ei-kokeellinen tutkimus",q:"Suuntaongelma tarkoittaa, ettei voida päätellä aiheuttaako X:n Y:n vai Y:n X:n korrelatiivisessa tutkimuksessa.",correct:true,explanation:"Ilman kokeellista manipulointia kausaliteetin suunta jää epäselväksi."},
  {cat:"Ei-kokeellinen tutkimus",q:"Kvasikokeellisissa tutkimuksissa käytetään satunnaistamista ryhmien muodostamiseksi.",correct:false,explanation:"Kvasikokeista PUUTTUU satunnaistaminen — se on niiden määrittelevä piirre. Ryhmät perustuvat olemassa oleviin ominaisuuksiin (esim. ikä, diagnoosi)."},
  {cat:"Ei-kokeellinen tutkimus",q:"Kolmannen muuttujan ongelma tarkoittaa, että mittaamaton muuttuja saattaa aiheuttaa molemmat korreloidut muuttujat.",correct:true,explanation:"Esimerkki: jäätelön myynti ja hukkumiskuolemat korreloivat, mutta kolmas muuttuja (kuuma sää) aiheuttaa molemmat."},
  {cat:"Ei-kokeellinen tutkimus",q:"Ankkuroitu teoria (grounded theory) rakentaa teoriaa aineistosta sen sijaan, että testaa olemassa olevaa teoriaa.",correct:true,explanation:"Ankkuroidussa teoriassa (laadullinen menetelmä) tutkija kerää ensin aineiston ja kehittää teorian induktiivisesti sen pohjalta."},

  // LUKU 8
  {cat:"Monimutkaiset asetelmat",q:"2×2-faktoriasetelma sisältää kaksi riippumatonta muuttujaa, kummallakin kaksi tasoa.",correct:true,explanation:"Merkintä kuvaa faktorien ja niiden tasojen määrän. 2×2 = kaksi faktoria, kummallakin kaksi tasoa = yhteensä 4 koetilannetta."},
  {cat:"Monimutkaiset asetelmat",q:"Pääefekti kuvaa, miten yhden riippumattoman muuttujan vaikutus riippuu toisen muuttujan tasosta.",correct:false,explanation:"Se kuvaa YHDYSVAIKUTUSTA (interaction). Pääefekti on yhden muuttujan kokonaisvaikutus, keskiarvoistettuina toisten muuttujien tasoilla."},
  {cat:"Monimutkaiset asetelmat",q:"Yhdysvaikutus (interaction) faktori-asetelmassa tarkoittaa, että yhden muuttujan vaikutus muuttuu toisen muuttujan tason mukaan.",correct:true,explanation:"Kun yhdysvaikutus on olemassa, yhden tekijän vaikutus on erilainen riippuen toisen tekijän tasosta."},
  {cat:"Monimutkaiset asetelmat",q:"Monimuuttujaregressio käyttää useita ennustajamuuttujia yhden tulosmuuttujan ennustamiseen.",correct:true,explanation:"Monimuuttujaregressio laajentaa yksinkertaista regressiota sisällyttämällä useita ennustajamuuttujia."},
  {cat:"Monimutkaiset asetelmat",q:"Faktorianalyysi testaa, aiheuttaako yksi muuttuja toisen.",correct:false,explanation:"Faktorianalyysi tunnistaa korreloivien muuttujien klustereita (latentteja faktoreita). Se ei testaa kausaalisia suhteita."},

  // LUKU 9
  {cat:"Kyselytutkimus",q:"Kaksoiskysymys (double-barrelled question) kysyy kahdesta eri asiasta kerralla.",correct:true,explanation:"Esim. 'Onko kurssi kiinnostava ja hyödyllinen?' — vastaaja voi pitää sitä kiinnostavana mutta ei hyödyllisenä."},
  {cat:"Kyselytutkimus",q:"Likert-asteikko käyttää tyypillisesti vaihteluväliä 1 (Täysin eri mieltä) — 5 (Täysin samaa mieltä).",correct:true,explanation:"Likert-asteikot ovat psykologian kyselytutkimusten yleisin arviointiasteikko asenteiden mittaamisessa."},
  {cat:"Kyselytutkimus",q:"Todennäköisyysotannassa jokaisella populaation jäsenellä on tunnettu mahdollisuus tulla valituksi.",correct:true,explanation:"Todennäköisyysotanta (esim. yksinkertainen satunnaisotanta) mahdollistaa tulosten yleistämisen populaatioon."},
  {cat:"Kyselytutkimus",q:"Mukavuusotanta on todennäköisyysotannan muoto.",correct:false,explanation:"Mukavuusotanta on EI-TODENNÄKÖISYYSOTANTAA — osallistujat valitaan saatavuuden perusteella, ei satunnaisesti."},
  {cat:"Kyselytutkimus",q:"Sosiaalisen suotavuuden harha tarkoittaa taipumusta vastata sosiaalisesti hyväksyttävällä tavalla.",correct:true,explanation:"Tämä on merkittävä uhka erityisesti arkaluontoisia aiheita koskevissa kyselyissä."},
  {cat:"Kyselytutkimus",q:"Vastaamatta jättämisen harha syntyy, kun vastaamattomat eroavat systemaattisesti vastaajista.",correct:true,explanation:"Jos vastaamattomat poikkeavat vastaajista tutkittavan asian suhteen, tulokset eivät edusta populaatiota tarkasti."},

  // LUKU 10
  {cat:"Yksittäistapaustutkimus",q:"ABA-asetelmassa (palautumisasetelma) hoito otetaan käyttöön ja poistetaan käyttäytymismuutoksen tarkkailemiseksi.",correct:true,explanation:"A = lähtötaso, B = hoito, A = palautus. Jos käyttäytyminen muuttuu B:ssä ja palautuu toisessa A:ssa, viittaa kausaaliseen yhteyteen."},
  {cat:"Yksittäistapaustutkimus",q:"Yksittäistapaustutkimuksella on erinomainen ulkoinen validiteetti ja yleistettävyys.",correct:false,explanation:"Yksittäistapaustutkimuksen ulkoinen validiteetti on RAJALLINEN, koska yhden yksilön tulokset eivät välttämättä yleisty muihin."},
  {cat:"Yksittäistapaustutkimus",q:"Moniperusviiva-asetelmassa hoito aloitetaan eri aikoina eri käyttäytymisille tai osallistujille.",correct:true,explanation:"Jos muutos tapahtuu vain kunkin käyttäytymisen/osallistujan kohdalla hoidon alkaessa, voidaan päätellä kausaalinen yhteys ilman hoidon poistamista."},

  // LUKU 11
  {cat:"Tutkimuksen esittäminen",q:"APA-tutkimusraportin menetelmäosion tulee olla riittävän yksityiskohtainen tutkimuksen toistamista varten.",correct:true,explanation:"Toistettavuus on tieteen kulmakivi. Menetelmäosio kuvaa osallistujat, materiaalit ja menettelyn riittävän tarkasti."},
  {cat:"Tutkimuksen esittäminen",q:"Pohdinta-osio (Discussion) sisältää tilastolliset analyysit.",correct:false,explanation:"Tilastolliset analyysit kuuluvat TULOKSET-osioon. Pohdinnassa tulkitaan tuloksia, käsitellään rajoituksia ja esitetään tulevaisuuden suuntia."},
  {cat:"Tutkimuksen esittäminen",q:"Tiivistelmä (abstract) on 150–250 sanan yhteenveto koko tutkimuspaperista.",correct:true,explanation:"Tiivistelmä on paperin alussa ja tiivistää tutkimuskysymyksen, menetelmän, tulokset ja johtopäätökset."},

  // LUKU 12
  {cat:"Kuvaileva tilastotiede",q:"Keskiarvo on mediaania vastustuskykyisempi poikkeaville arvoille (outlier).",correct:false,explanation:"MEDIAANI on kestävämpi poikkeaville arvoille. Keskiarvo vetäytyy ääriarvojen suuntaan."},
  {cat:"Kuvaileva tilastotiede",q:"Keskihajonta on yleisin raportoitu hajonnan mitta.",correct:true,explanation:"Keskihajonta mittaa arvojen keskimääräistä etäisyyttä keskiarvosta ja on psykologisen tutkimuksen vakiomitta."},
  {cat:"Kuvaileva tilastotiede",q:"Normaalijakaumassa noin 95 % arvoista on ±2 keskihajonnan sisällä keskiarvosta.",correct:true,explanation:"Empiirinen sääntö: 68 % ±1 SD:n sisällä, 95 % ±2 SD:n sisällä, 99,7 % ±3 SD:n sisällä."},
  {cat:"Kuvaileva tilastotiede",q:"Pearsonin r vaihtelee 0:sta +1:een.",correct:false,explanation:"Pearsonin r vaihtelee −1:stä +1:een. Negatiiviset arvot kuvaavat käänteistä yhteyttä; positiiviset suoraa yhteyttä."},
  {cat:"Kuvaileva tilastotiede",q:"Cohenin ohjeiden mukaan r = 0,5 on vahva korrelaatio.",correct:true,explanation:"Cohenin ohjeet: r ≈ 0,1 = pieni, 0,3 = kohtalainen, 0,5+ = suuri/vahva."},
  {cat:"Kuvaileva tilastotiede",q:"Moodi on ainoa nominaalitason aineistolle sopiva keskiluku.",correct:true,explanation:"Kategorioille (esim. lempiväri) ei voi laskea keskiarvoa tai mediaania. Yleisin luokka (moodi) on ainoa vaihtoehto."},

  // LUKU 13
  {cat:"Päättelytilastotiede",q:"Nollahypoteesi väittää, ettei efektiä tai eroa ole.",correct:true,explanation:"H₀ on oletusarvio: yhteyttä tai eroa ei ole. Tutkija pyrkii hylkäämään H₀:n löytämällä näyttöä vaihtoehtoiselle hypoteesille."},
  {cat:"Päättelytilastotiede",q:"p-arvo on todennäköisyys sille, että nollahypoteesi on tosi.",correct:false,explanation:"Yleinen väärinkäsitys! p-arvo on todennäköisyys saada vähintään yhtä äärimmäinen tulos OLETTAEN H₀:n todeksi. Se ei ole H₀:n totuuden todennäköisyys."},
  {cat:"Päättelytilastotiede",q:"Tyypin I virhe tapahtuu, kun H₀ hylätään, vaikka se on tosi (väärä positiivinen).",correct:true,explanation:"Tyypin I virhe = väärä hälytys. Sen todennäköisyys = α (yleensä 0,05). Tyypin II virhe = missataan todellinen efekti."},
  {cat:"Päättelytilastotiede",q:"Tilastollinen voima on todennäköisyys hylätä oikeutetusti epätosi nollahypoteesi.",correct:true,explanation:"Voima = 1 − β. Se kasvaa suuremmalla otoskoolla, suuremmalla efektikoolla ja väljemmällä alfa-tasolla."},
  {cat:"Päättelytilastotiede",q:"Tilastollisesti merkitsevä tulos tarkoittaa aina, että efekti on suuri ja käytännössä tärkeä.",correct:false,explanation:"Tilastollinen merkitsevyys riippuu otoskoosta. Hyvin suurilla otoksilla pienetkin merkityksettömät efektit voivat olla merkitseviä. Efektikoko kertoo käytännön merkityksestä."},
  {cat:"Päättelytilastotiede",q:"Cohenin d = 0,8 on suuri efektikoko.",correct:true,explanation:"Cohenin ohjeet d:lle: 0,2 = pieni, 0,5 = keskisuuri, 0,8 = suuri."},
  {cat:"Päättelytilastotiede",q:"ANOVA käyttää F-testiä kolmen tai useamman ryhmän keskiarvojen vertailuun.",correct:true,explanation:"Yksisuuntainen ANOVA testaa, eroavatko vähintään kahden ryhmän keskiarvot toisistaan merkitsevästi F-suhteen avulla."},
  {cat:"Päättelytilastotiede",q:"95 % luottamusväli tarkoittaa, että on 95 % todennäköisyys, että todellinen parametri sijaitsee tämän nimenomaisen välin sisällä.",correct:false,explanation:"Tarkasti: jos tutkimus toistettaisiin monta kertaa, 95 % lasketuista väleistä sisältäisi todellisen parametrin. Yksittäinen väli joko sisältää sen tai ei."},
  {cat:"Päättelytilastotiede",q:"P-hakkerointi tarkoittaa monien analyysien kokeilemista kunnes saadaan p < 0,05.",correct:true,explanation:"P-hakkerointi kasvattaa väärien positiivisten todennäköisyyttä. Esirekisteröinti auttaa estämään tätä."},
  {cat:"Päättelytilastotiede",q:"HARKing tarkoittaa hypoteesien muodostamista tulosten tuntemisen jälkeen.",correct:true,explanation:"HARKing (Hypothesising After Results are Known) = jälkikäteishypoteesien esittäminen ikään kuin ne olisi muodostettu etukäteen. Kyseenalainen tutkimuskäytäntö."},
  {cat:"Päättelytilastotiede",q:"Esirekisteröinti tarkoittaa tutkimussuunnitelman julkaisemista ennen aineistonkeruuta.",correct:true,explanation:"Esirekisteröinti on avoimen tieteen käytäntö, joka estää p-hakkerointia ja HARKingia sitoutumalla analyyseihin etukäteen."},
  {cat:"Päättelytilastotiede",q:"Khiin neliö -testiä käytetään kahden ryhmän keskiarvojen vertailuun.",correct:false,explanation:"Khiin neliö testaa KATEGORISTEN muuttujien yhteyttä. Keskiarvojen vertailuun käytetään t-testiä (2 ryhmää) tai ANOVAa (3+ ryhmää)."}
];

// ══════════════════════════════════════
//  SOVELLUSLOGIIKKA
// ══════════════════════════════════════
let mode='study',currentChapter=0,quizCat='all',queue=[],qIdx=0,score=0,answered=false;

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(m==='study'?0:1)===i));
  document.getElementById('studyArea').classList.toggle('show',m==='study');
  document.getElementById('quizArea').classList.toggle('show',m==='quiz');
  if(m==='quiz')restartQuiz();
}
function buildStudy(){
  const nav=document.getElementById('chapterNav');
  CHAPTERS.forEach((ch,i)=>{const btn=document.createElement('button');btn.className='ch-btn'+(i===0?' active':'');btn.textContent=ch.title.replace('Luku ','').split(':')[0];btn.onclick=()=>showChapter(i);nav.appendChild(btn);});
  showChapter(0);
}
function showChapter(i){currentChapter=i;document.querySelectorAll('.ch-btn').forEach((b,j)=>b.classList.toggle('active',j===i));document.getElementById('studyContent').innerHTML=CHAPTERS[i].html;}
function buildCatBar(){
  const cats=[...new Set(QUESTIONS.map(q=>q.cat))];
  const bar=document.getElementById('categoryBar');
  bar.innerHTML='<button class="cat-btn active" onclick="setCat(\'all\')">Kaikki</button>';
  cats.forEach(c=>{const b=document.createElement('button');b.className='cat-btn';b.textContent=c;b.onclick=()=>setCat(c);bar.appendChild(b);});
}
function setCat(c){quizCat=c;document.querySelectorAll('#categoryBar .cat-btn').forEach(b=>b.classList.toggle('active',(c==='all'&&b.textContent==='Kaikki')||b.textContent===c));restartQuiz();}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function restartQuiz(){const pool=quizCat==='all'?QUESTIONS:QUESTIONS.filter(q=>q.cat===quizCat);queue=shuffle(pool);qIdx=0;score=0;answered=false;document.getElementById('resultScreen').classList.remove('show');document.getElementById('quizInner').style.display='block';showQ();}
function restartSame(){restartQuiz();}
function showQ(){
  if(qIdx>=queue.length){showResult();return;}answered=false;const q=queue[qIdx];
  document.getElementById('progressFill').style.width=(qIdx/queue.length*100)+'%';
  document.getElementById('questionCounter').textContent=`Väittämä ${qIdx+1} / ${queue.length}`;
  document.getElementById('scorePill').textContent=`Oikein: ${score}`;
  document.getElementById('catBadge').textContent=q.cat;
  document.getElementById('questionText').textContent=q.q;
  document.querySelectorAll('.tf-btn').forEach(b=>{b.disabled=false;b.className=b.classList.contains('true-btn')?'tf-btn true-btn':'tf-btn false-btn';});
  document.getElementById('explanation').className='explanation';document.getElementById('explanation').innerHTML='';document.getElementById('nextBtn').className='next-btn';
}
function selectAnswer(userTrue){
  if(answered)return;answered=true;const q=queue[qIdx],ok=(userTrue===q.correct);if(ok)score++;
  document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  const tb=document.querySelector('.true-btn'),fb=document.querySelector('.false-btn');
  if(userTrue){tb.classList.add(ok?'selected-correct':'selected-wrong');if(!ok)fb.classList.add('was-correct');}
  else{fb.classList.add(ok?'selected-correct':'selected-wrong');if(!ok)tb.classList.add('was-correct');}
  const el=document.getElementById('explanation');
  el.innerHTML=`<strong>${ok?'✓ Oikein!':'✗ Väärin — väittämä oli '+(q.correct?'OIKEIN':'VÄÄRIN')+'.'}</strong> ${q.explanation}`;
  el.className='explanation show';document.getElementById('nextBtn').className='next-btn show';
}
function nextQuestion(){qIdx++;showQ();}
function showResult(){
  document.getElementById('quizInner').style.display='none';
  const rs=document.getElementById('resultScreen');rs.classList.add('show');
  const pct=Math.round(score/queue.length*100);
  document.getElementById('resultScore').textContent=`${score}/${queue.length}`;
  let g='';if(pct>=90)g='🏆 Erinomainen!';else if(pct>=75)g='🎯 Hyvä suoritus!';else if(pct>=60)g='📚 Kohtuullinen – kertaa vielä!';else g='💪 Lisää opiskelua tarvitaan!';
  document.getElementById('resultGrade').textContent=g;
}
buildStudy();buildCatBar();
</script>
