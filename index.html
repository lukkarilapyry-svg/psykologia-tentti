// ─── State ──────────────────────
let currentCategory = 'all';
let queue = [];
let currentIndex = 0;
let score = 0;
let answered = false;

function buildCategoryBar() {
  const cats = [...new Set(QUESTIONS.map(q => q.cat))].sort();
  const bar = document.getElementById('categoryBar');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat;
    btn.onclick = () => setCategory(cat);
    bar.appendChild(btn);
  });
}

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active',
      (cat === 'all' && b.textContent === 'Kaikki') || b.textContent === cat);
  });
  restart();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function restart() {
  const pool = currentCategory === 'all'
    ? QUESTIONS : QUESTIONS.filter(q => q.cat === currentCategory);
  queue = shuffle(pool);
  currentIndex = 0; score = 0; answered = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('quizArea').classList.remove('hidden');
  showQuestion();
}
function restartSame() { restart(); }

function showQuestion() {
  if (currentIndex >= queue.length) { showResult(); return; }
  answered = false;
  const q = queue[currentIndex];
  const pct = (currentIndex / queue.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('questionCounter').textContent =
    `Väittämä ${currentIndex + 1} / ${queue.length}`;
  document.getElementById('scorePill').textContent = `Oikein: ${score}`;
  document.getElementById('categoryBadge').textContent = q.cat;
  document.getElementById('questionText').textContent = q.q;

  // Reset buttons
  const btns = document.querySelectorAll('.tf-btn');
  btns.forEach(b => {
    b.disabled = false;
    b.className = b.classList.contains('true-btn') ? 'tf-btn true-btn' : 'tf-btn false-btn';
  });

  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('nextBtn').className = 'next-btn';
}

function selectAnswer(userSaidTrue) {
  if (answered) return;
  answered = true;
  const q = queue[currentIndex];
  const isCorrect = (userSaidTrue === q.correct);
  if (isCorrect) score++;

  const btns = document.querySelectorAll('.tf-btn');
  btns.forEach(b => b.disabled = true);

  const trueBtn = document.querySelector('.true-btn');
  const falseBtn = document.querySelector('.false-btn');

  if (userSaidTrue) {
    trueBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
    if (!isCorrect) falseBtn.classList.add('was-correct');
  } else {
    falseBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
    if (!isCorrect) trueBtn.classList.add('was-correct');
  }

  const expEl = document.getElementById('explanation');
  const verdict = isCorrect ? '✓ Oikein!' : `✗ Väärin — väittämä oli ${q.correct ? 'OIKEIN' : 'VÄÄRIN'}.`;
  expEl.innerHTML = `<strong>${verdict}</strong> ${q.explanation}`;
  expEl.className = 'explanation show';
  document.getElementById('nextBtn').className = 'next-btn show';
}

function nextQuestion() { currentIndex++; showQuestion(); }

function showResult() {
  document.getElementById('quizArea').classList.add('hidden');
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');
  const total = queue.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('resultScore').textContent = `${score}/${total}`;
  let grade = '';
  if (pct >= 90) grade = '🏆 Erinomainen!';
  else if (pct >= 75) grade = '🎯 Hyvä suoritus!';
  else if (pct >= 60) grade = '📚 Kohtuullinen – kertaa vielä!';
  else grade = '💪 Lisää opiskelua tarvitaan!';
  document.getElementById('resultGrade').textContent = grade;
}

buildCategoryBar();
restart();
</script>
